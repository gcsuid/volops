<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VolOps – Organisation Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dash-root">

  <header class="dash-header">
    <div class="dash-header-left">
      <span class="dash-brand">VolOps</span>
      <span class="role-badge role-org">Organisation</span>
    </div>
    <div class="dash-header-right">
      <span class="id-badge" id="header-org-id">—</span>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="dash-greeting">
      <h2 id="greeting-text">Welcome!</h2>
      <p>Overview of all volunteer drives across your organisation.</p>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Drives</div>
        <div class="stat-value" id="stat-drives">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Drives</div>
        <div class="stat-value stat-active" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Attendees</div>
        <div class="stat-value" id="stat-attendees">—</div>
      </div>
    </div>

    <div class="section-header">
      <h3>All Drives</h3>
      <button class="btn btn-outline btn-sm" onclick="loadDrives()">Refresh</button>
    </div>

    <div class="alert alert-error hidden" id="drives-error"></div>

    <div class="drives-table-wrap" id="drives-table-wrap">
      <table class="drives-table" id="drives-table">
        <thead>
          <tr>
            <th>Drive Name</th>
            <th>Manager</th>
            <th>Location</th>
            <th>Status</th>
            <th>Attendees</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="drives-tbody">
          <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay hidden" id="drive-modal" onclick="closeModalOnBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-drive-name">Drive Details</h3>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="drive-meta" id="modal-meta"></div>
        <h4 style="font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px;">Attendees</h4>
        <div id="modal-attendees-wrap">
          <table class="attendees-table">
            <thead>
              <tr><th>#</th><th>Name</th><th>Email</th><th>Check-in Time</th></tr>
            </thead>
            <tbody id="modal-attendees-body"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success btn-sm" id="modal-download-btn" onclick="downloadDrive()">Download CSV</button>
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('vo_token');
    const role = localStorage.getItem('vo_role');
    const orgId = localStorage.getItem('vo_org_id');
    const name = localStorage.getItem('vo_name');

    if (!token || role !== 'organization') {
      window.location.replace('/');
    }

    document.getElementById('header-org-id').textContent = orgId || '';
    document.getElementById('greeting-text').textContent = `Welcome, ${name}!`;

    let currentDriveId = null;

    async function loadDrives() {
      const errEl = document.getElementById('drives-error');
      try {
        const res = await fetch('/api/org/drives', { headers: { 'x-session-token': token } });
        if (res.status === 401) { handleLogout(); return; }
        const drives = await res.json();
        renderDrives(drives);
        updateStats(drives);
      } catch (err) {
        errEl.textContent = 'Failed to load drives.';
        errEl.classList.remove('hidden');
      }
    }

    function updateStats(drives) {
      document.getElementById('stat-drives').textContent = drives.length;
      document.getElementById('stat-active').textContent = drives.filter(d => d.status === 'active').length;
      document.getElementById('stat-attendees').textContent = drives.reduce((s, d) => s + (d.attendee_count || 0), 0);
    }

    function renderDrives(drives) {
      const tbody = document.getElementById('drives-tbody');
      if (!drives || drives.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No drives found yet.</p></div></td></tr>';
        return;
      }
      drives.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      tbody.innerHTML = drives.map(d => `
        <tr>
          <td><strong>${escHtml(d.name)}</strong></td>
          <td>${escHtml(d.manager_name || '—')}</td>
          <td>${escHtml(d.location || '—')}</td>
          <td><span class="badge badge-${d.status === 'active' ? 'success' : d.status === 'ended' ? 'muted' : 'warning'}">${d.status}</span></td>
          <td>${d.attendee_count || 0}</td>
          <td>
            <div class="action-btns">
              <button class="btn btn-outline btn-sm" onclick="viewDrive('${d.id}')">View</button>
              <button class="btn btn-success btn-sm" onclick="downloadDriveById('${d.id}', '${escHtml(d.name)}')">CSV</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function viewDrive(driveId) {
      currentDriveId = driveId;
      const modal = document.getElementById('drive-modal');
      modal.classList.remove('hidden');
      document.getElementById('modal-meta').innerHTML = '<em style="color:var(--text-muted)">Loading…</em>';
      document.getElementById('modal-attendees-body').innerHTML = '';

      try {
        const res = await fetch(`/api/org/drives/${driveId}`, { headers: { 'x-session-token': token } });
        const drive = await res.json();
        if (!res.ok) throw new Error(drive.error);

        const driveData = drive;

        document.getElementById('modal-drive-name').textContent = driveData.name;
        document.getElementById('modal-meta').innerHTML = `
          <div class="meta-item"><span>Location</span><strong>${escHtml(driveData.location || '—')}</strong></div>
          <div class="meta-item"><span>Manager</span><strong>${escHtml(driveData.manager_name || '—')}</strong></div>
          <div class="meta-item"><span>Status</span><strong>${driveData.status}</strong></div>
          <div class="meta-item"><span>Created</span><strong>${formatDate(driveData.created_at)}</strong></div>
        `;

        const attendeesRes = await fetch(`/api/org/drives/${driveId}/attendees`, { headers: { 'x-session-token': token } });
        const attendees = await attendeesRes.json();
        const tbody = document.getElementById('modal-attendees-body');

        if (!attendees || attendees.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted);">No attendees recorded.</td></tr>';
        } else {
          tbody.innerHTML = attendees.map((a, i) => `
            <tr><td>${i + 1}</td><td>${escHtml(a.name)}</td><td>${escHtml(a.email)}</td><td>${formatDate(a.checked_in_at)}</td></tr>
          `).join('');
        }
      } catch (err) {
        document.getElementById('modal-meta').innerHTML = `<p class="alert alert-error">${err.message}</p>`;
      }
    }

    function closeModal() {
      document.getElementById('drive-modal').classList.add('hidden');
      currentDriveId = null;
    }

    function closeModalOnBackdrop(e) {
      if (e.target === document.getElementById('drive-modal')) closeModal();
    }

    function downloadDrive() {
      if (currentDriveId) downloadDriveById(currentDriveId);
    }

    function downloadDriveById(driveId, name) {
      const url = `/api/org/drives/${driveId}/download`;
      fetch(url, { headers: { 'x-session-token': token } })
        .then(r => { if (!r.ok) throw new Error('Download failed.'); return r.blob(); })
        .then(blob => {
          const objUrl = URL.createObjectURL(blob);
          const anchor = document.createElement('a');
          anchor.href = objUrl;
          anchor.download = `${name}_attendees.csv`;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objUrl);
        })
        .catch(err => alert('Download error: ' + err.message));
    }

    function formatDate(str) {
      if (!str) return '—';
      return new Date(str).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function handleLogout() {
      localStorage.removeItem('vo_token');
      localStorage.removeItem('vo_role');
      localStorage.removeItem('vo_org_id');
      localStorage.removeItem('vo_name');
      window.location.replace('/');
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadDrives();
  </script>
</body>
</html>
