<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VolOps – Organisation Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-root">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <h1>VolOps</h1>
      <p>Organisation Portal</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      <button class="auth-tab" id="tab-login" onclick="showTab('login')">Login</button>
    </div>

    <!-- ── SIGNUP FORM ──────────────────────────────────────────────────── -->
    <div id="panel-signup">
      <!-- Success banner shown after signup -->
      <div id="signup-success" class="hidden">
        <div class="company-id-banner">
          <p>Your unique Company ID</p>
          <strong id="signup-company-id">—</strong>
          <small>Save this ID – you will use it to log in every time.</small>
        </div>
        <div class="alert alert-success" id="signup-success-msg"></div>
        <button class="btn btn-primary" onclick="goToDashboard()">Go to Dashboard →</button>
      </div>

      <!-- Signup form -->
      <div id="signup-form-wrap">
        <div class="alert alert-error hidden" id="signup-error"></div>
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signup-email">Organisation Email</label>
            <input type="email" id="signup-email" placeholder="contact@yourorg.com" required />
          </div>
          <div class="form-group">
            <label for="signup-poc">Point of Contact Name</label>
            <input type="text" id="signup-poc" placeholder="e.g. Riya Kapoor" required />
          </div>
          <button type="submit" class="btn btn-primary" id="signup-btn">
            <span id="signup-btn-text">Create Organisation</span>
          </button>
        </form>
      </div>
    </div>

    <!-- ── LOGIN FORM ───────────────────────────────────────────────────── -->
    <div id="panel-login" class="hidden">
      <div class="alert alert-error hidden" id="login-error"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-company-id">Company ID</label>
          <input type="text" id="login-company-id" placeholder="e.g. ORG-123456"
                 autocomplete="off" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span id="login-btn-text">Login</span>
        </button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:.85rem;color:var(--text-muted);">
        Don't have an account? <a href="#" onclick="showTab('signup')" style="color:var(--primary);font-weight:600;">Sign up here</a>
      </p>
    </div>
  </div>

  <script>
    // ── Redirect if already logged in ────────────────────────────────────────
    if (localStorage.getItem('vo_token') && localStorage.getItem('vo_companyId')) {
      window.location.replace('/dashboard.html');
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    function showTab(tab) {
      document.getElementById('panel-signup').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('panel-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    }

    // ── Signup ────────────────────────────────────────────────────────────────
    async function handleSignup(e) {
      e.preventDefault();
      const email   = document.getElementById('signup-email').value.trim();
      const pocName = document.getElementById('signup-poc').value.trim();
      const errEl   = document.getElementById('signup-error');
      const btn     = document.getElementById('signup-btn');
      const btnTxt  = document.getElementById('signup-btn-text');

      errEl.classList.add('hidden');
      btn.disabled = true;
      btnTxt.textContent = 'Creating…';

      try {
        const res  = await fetch('/api/org/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, pocName })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Signup failed.';
          errEl.classList.remove('hidden');
          return;
        }

        // Store session
        localStorage.setItem('vo_token',     data.token);
        localStorage.setItem('vo_companyId', data.companyId);
        localStorage.setItem('vo_pocName',   data.pocName);

        // Show success with company ID
        document.getElementById('signup-company-id').textContent = data.companyId;
        document.getElementById('signup-success-msg').textContent =
          `Welcome, ${data.pocName}! Your organisation has been created.`;
        document.getElementById('signup-form-wrap').classList.add('hidden');
        document.getElementById('signup-success').classList.remove('hidden');

      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnTxt.textContent = 'Create Organisation';
      }
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const companyId = document.getElementById('login-company-id').value.trim();
      const errEl     = document.getElementById('login-error');
      const btn       = document.getElementById('login-btn');
      const btnTxt    = document.getElementById('login-btn-text');

      errEl.classList.add('hidden');
      btn.disabled = true;
      btnTxt.textContent = 'Logging in…';

      try {
        const res  = await fetch('/api/org/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ companyId })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed.';
          errEl.classList.remove('hidden');
          return;
        }

        localStorage.setItem('vo_token',     data.token);
        localStorage.setItem('vo_companyId', data.companyId);
        localStorage.setItem('vo_pocName',   data.pocName);

        window.location.replace('/dashboard.html');

      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnTxt.textContent = 'Login';
      }
    }

    function goToDashboard() {
      window.location.replace('/dashboard.html');
    }
  </script>
</body>
</html>
