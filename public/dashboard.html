<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VolOps – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dash-root">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="dash-header">
    <div class="dash-header-left">
      <span class="dash-brand">VolOps</span>
    </div>
    <div class="dash-header-right">
      <!-- Company ID badge – always visible in the top-right corner -->
      <span class="company-id-badge" id="header-company-id" title="Your unique Company ID">—</span>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="dash-main">
    <div class="dash-greeting">
      <h2 id="greeting-text">Welcome back!</h2>
      <p id="greeting-sub">Here's an overview of your volunteer drives.</p>
    </div>

    <!-- Stats row -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Drives</div>
        <div class="stat-value" id="stat-drives">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Attendees</div>
        <div class="stat-value" id="stat-attendees">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Latest Drive</div>
        <div class="stat-value" style="font-size:1.2rem" id="stat-latest">—</div>
      </div>
    </div>

    <!-- Drives table -->
    <div class="section-header">
      <h3>Volunteer Drives</h3>
    </div>

    <div class="alert alert-error hidden" id="drives-error"></div>

    <div class="drives-table-wrap" id="drives-table-wrap">
      <table class="drives-table" id="drives-table">
        <thead>
          <tr>
            <th>Drive Name</th>
            <th>Date</th>
            <th>Location</th>
            <th>Attendees</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="drives-tbody">
          <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- ── Drive Detail Modal ───────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="drive-modal" onclick="closeModalOnBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-drive-name">Drive Details</h3>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="drive-meta" id="modal-meta"></div>

        <h4 style="font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px;">
          Attendees
        </h4>
        <div id="modal-attendees-wrap">
          <table class="attendees-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Check-in Time</th>
              </tr>
            </thead>
            <tbody id="modal-attendees-body"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success btn-sm" id="modal-download-btn" onclick="downloadDrive()">
          ⬇ Download CSV
        </button>
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ── Auth guard ────────────────────────────────────────────────────────────
    const token     = localStorage.getItem('vo_token');
    const companyId = localStorage.getItem('vo_companyId');
    const pocName   = localStorage.getItem('vo_pocName');

    if (!token || !companyId) {
      window.location.replace('/');
    }

    // ── Populate header badge & greeting ──────────────────────────────────────
    document.getElementById('header-company-id').textContent = companyId;
    if (pocName) {
      document.getElementById('greeting-text').textContent = `Welcome, ${pocName}!`;
    }

    // ── Load drives ────────────────────────────────────────────────────────────
    let currentDriveId = null;

    async function loadDrives() {
      const errEl = document.getElementById('drives-error');
      try {
        const res  = await fetch('/api/org/drives', {
          headers: { 'x-session-token': token }
        });

        if (res.status === 401) {
          handleLogout();
          return;
        }

        const drives = await res.json();

        if (!Array.isArray(drives) || drives.length === 0) {
          document.getElementById('drives-tbody').innerHTML =
            `<tr><td colspan="5">
              <div class="empty-state">
                <p>No drives found yet.</p>
              </div>
            </td></tr>`;
          updateStats([], null);
          return;
        }

        renderDrives(drives);
        updateStats(drives, drives[drives.length - 1]);

      } catch (err) {
        errEl.textContent = 'Failed to load drives. Please refresh.';
        errEl.classList.remove('hidden');
      }
    }

    function updateStats(drives, latest) {
      document.getElementById('stat-drives').textContent = drives.length;
      const totalAttendees = drives.reduce((s, d) => s + (d.attendeeCount || 0), 0);
      document.getElementById('stat-attendees').textContent = totalAttendees;
      document.getElementById('stat-latest').textContent = latest
        ? formatDate(latest.date)
        : '—';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderDrives(drives) {
      const tbody = document.getElementById('drives-tbody');
      tbody.innerHTML = '';

      // Sort newest first (in-place)
      drives.sort((a, b) => new Date(b.date) - new Date(a.date));

      for (const drive of drives) {
        const tr = document.createElement('tr');
        tr.dataset.driveId = drive.id;
        tr.innerHTML = `
          <td><strong>${escHtml(drive.name)}</strong></td>
          <td>${formatDate(drive.date)}</td>
          <td>${escHtml(drive.location || '—')}</td>
          <td><span class="badge badge-primary">${drive.attendeeCount} volunteers</span></td>
          <td>
            <div class="action-btns">
              <button class="btn btn-outline btn-sm" data-action="view" data-drive-id="${escHtml(drive.id)}">View</button>
              <button class="btn btn-success btn-sm" data-action="download" data-drive-id="${escHtml(drive.id)}" data-drive-name="${escHtml(drive.name)}">⬇ CSV</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }

      // Single delegated event listener to avoid inline onclick / XSS
      tbody.addEventListener('click', function handleDriveClick(e) {
        const btn = e.target.closest('button[data-action]');
        const row = e.target.closest('tr[data-drive-id]');
        if (btn) {
          e.stopPropagation();
          if (btn.dataset.action === 'view') {
            viewDrive(btn.dataset.driveId);
          } else if (btn.dataset.action === 'download') {
            downloadDriveById(btn.dataset.driveId, btn.dataset.driveName);
          }
        } else if (row) {
          viewDrive(row.dataset.driveId);
        }
      }, { once: true });
    }

    // ── Drive detail modal ────────────────────────────────────────────────────
    async function viewDrive(driveId) {
      currentDriveId = driveId;

      const modal = document.getElementById('drive-modal');
      modal.classList.remove('hidden');
      document.getElementById('modal-meta').innerHTML = '<em style="color:var(--text-muted)">Loading…</em>';
      document.getElementById('modal-attendees-body').innerHTML = '';

      try {
        const res  = await fetch(`/api/org/drives/${driveId}`, {
          headers: { 'x-session-token': token }
        });
        const drive = await res.json();

        if (!res.ok) throw new Error(drive.error || 'Failed to load drive.');

        document.getElementById('modal-drive-name').textContent = drive.name;

        document.getElementById('modal-meta').innerHTML = `
          <div class="meta-item"><span>Date</span><strong>${formatDate(drive.date)}</strong></div>
          <div class="meta-item"><span>Location</span><strong>${escHtml(drive.location || '—')}</strong></div>
          <div class="meta-item"><span>Drive ID</span><strong style="font-size:.8rem;word-break:break-all">${escHtml(drive.id)}</strong></div>
          <div class="meta-item"><span>Attendees</span><strong>${(drive.attendees || []).length}</strong></div>
        `;

        const tbody = document.getElementById('modal-attendees-body');
        tbody.innerHTML = '';

        if (!drive.attendees || drive.attendees.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted);">No attendees recorded.</td></tr>';
        } else {
          drive.attendees.forEach((a, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${i + 1}</td>
              <td>${escHtml(a.name)}</td>
              <td>${escHtml(a.email)}</td>
              <td>${escHtml(a.phone)}</td>
              <td>${escHtml(a.checkInTime)}</td>
            `;
            tbody.appendChild(tr);
          });
        }

      } catch (err) {
        document.getElementById('modal-meta').innerHTML =
          `<p class="alert alert-error">${err.message}</p>`;
      }
    }

    function closeModal() {
      document.getElementById('drive-modal').classList.add('hidden');
      currentDriveId = null;
    }

    function closeModalOnBackdrop(e) {
      if (e.target === document.getElementById('drive-modal')) closeModal();
    }

    // ── Download ──────────────────────────────────────────────────────────────
    function downloadDrive() {
      if (currentDriveId) downloadDriveById(currentDriveId);
    }

    function downloadDriveById(driveId, _name) {
      // Trigger CSV download via a temporary link with the token as query param.
      // The server returns Content-Disposition: attachment.
      const url = `/api/org/drives/${driveId}/download`;
      const a   = document.createElement('a');
      a.href    = url;
      a.setAttribute('download', '');

      // Attach token via fetch + Blob so the auth header is sent correctly
      fetch(url, { headers: { 'x-session-token': token } })
        .then(r => {
          if (!r.ok) throw new Error('Download failed.');
          const disposition = r.headers.get('content-disposition') || '';
          const match = disposition.match(/filename="([^"]+)"/);
          const filename = match ? match[1] : 'drive.csv';
          return r.blob().then(blob => ({ blob, filename }));
        })
        .then(({ blob, filename }) => {
          const objUrl  = URL.createObjectURL(blob);
          const anchor  = document.createElement('a');
          anchor.href   = objUrl;
          anchor.download = filename;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objUrl);
        })
        .catch(err => alert('Download error: ' + err.message));
    }

    // ── Logout ────────────────────────────────────────────────────────────────
    function handleLogout() {
      localStorage.removeItem('vo_token');
      localStorage.removeItem('vo_companyId');
      localStorage.removeItem('vo_pocName');
      window.location.replace('/');
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    loadDrives();
  </script>
</body>
</html>
